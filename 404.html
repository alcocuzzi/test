<!DOCTYPE html>
<html>
<head><!--__gh_pages_base__--><script>(function(){try{var basePath="/";var host=location.hostname||"";if(host.endsWith(".github.io")){var seg=(location.pathname||"/").split("/")[1];if(seg) basePath="/"+seg+"/";}document.write('<base href="'+basePath+'">');}catch(e){}})();</script>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
        // Get the current path
        const path = window.location.pathname;
        
        // Redirect to the appropriate page.html
        if (path.includes('/about')) {
            window.location.replace('/about/page.html');
        } else if (path.includes('/contact')) {
            window.location.replace('/contact/page.html');
        } else if (path.includes('/privacy')) {
            window.location.replace('/privacy/page.html');
        }
    </script>
</head>
<body>
    <p>Redirecting...</p>
</body>
</html>
